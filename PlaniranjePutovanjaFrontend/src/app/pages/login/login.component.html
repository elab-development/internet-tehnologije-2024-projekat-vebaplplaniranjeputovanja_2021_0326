<div class="container mt-5">
  <h2>Prijava</h2>
  <form (ngSubmit)="onLogin()" #loginForm="ngForm">
    <input class="form-control mb-2" name="email" [(ngModel)]="email" placeholder="Email" required>
    <input class="form-control mb-2" name="password" [(ngModel)]="password" type="password" placeholder="Lozinka" required>
    <button class="btn btn-primary">Prijava</button>
    <button class="btn btn-logout " >Zaboravljena lozinka?</button>
  </form>
</div>
